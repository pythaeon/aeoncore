name: pihole

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80/tcp"
    environment:
      TZ: America/Chicago
      DNS1: 1.1.1.1
      DNS2: 1.0.0.1
      WEBPASSWORD: ${PIHOLE_PASSWORD}
    volumes:
      - /srv/appdata/pihole/etc-pihole:/etc/pihole
      - /srv/appdata/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    networks:
      - pihole_net

networks:
  pihole_net:
    name: pihole_net
```

Then `sirius/pihole/.env.example`:
```
PIHOLE_PASSWORD=your_password_here