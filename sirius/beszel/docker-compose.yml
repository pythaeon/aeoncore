name: beszel

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    hostname: beszel
    restart: unless-stopped
    ports:
      - "8090:8090/tcp"
    environment:
      APP_URL: http://beszel.aeoncore.net
    volumes:
      - /srv/appdata/beszel/beszel_data:/beszel_data
      - /srv/appdata/beszel/beszel_socket:/beszel_socket
    networks:
      - beszel_net

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    hostname: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      HUB_URL: http://localhost:8090
      KEY: ${BESZEL_KEY}
      LISTEN: /beszel_socket/beszel.sock
      TOKEN: ${BESZEL_TOKEN}
    volumes:
      - /srv/appdata/beszel/beszel_agent_data:/var/lib/beszel-agent
      - /srv/appdata/beszel/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  beszel_net:
    name: beszel_net
```

`sirius/beszel/.env.example`:
```
BESZEL_KEY=your_ssh_ed25519_public_key_here
BESZEL_TOKEN=your_token_here